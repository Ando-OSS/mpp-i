title: "[Research review]: "
labels: ["technical-feedback"]
body:
  - type: markdown
    attributes:
      value: "Use this for research review, citation review, inference-engineering review, and technical critique of the MPP-I paper or future specs."
  - type: textarea
    id: location
    attributes:
      label: Location
      description: Paper section, spec section, claim, figure, table, or URL.
    validations:
      required: true
  - type: textarea
    id: finding
    attributes:
      label: Finding
      description: What is technically unclear, unsupported, incomplete, or incorrect?
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence or source
      description: Link to source material, implementation experience, benchmark evidence, or relevant prior work.
    validations:
      required: false
  - type: textarea
    id: suggestion
    attributes:
      label: Suggested improvement
      description: How should the paper or spec be improved?
    validations:
      required: false

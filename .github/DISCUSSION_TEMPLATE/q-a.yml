title: "[Question]: "
labels: ["q-a"]
body:
  - type: markdown
    attributes:
      value: "Ask an MPP-I question here. If the question becomes actionable, maintainers may move it to an Issue."
  - type: textarea
    id: question
    attributes:
      label: Question
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Add any relevant paper section, protocol surface, implementation context, or link.
    validations:
      required: false

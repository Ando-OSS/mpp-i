name: Link Check

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check Markdown links
        uses: lycheeverse/lychee-action@v2
        with:
          args: --verbose --no-progress './**/*.md' './**/*.mdx'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


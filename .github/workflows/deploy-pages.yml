name: Deploy GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "pages/**"
      - "paper/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Prepare static artifact
        run: |
          mkdir -p _site
          cp -R pages/. _site/
          cp paper/mpp-i-paper-v1.0.pdf _site/mpp-i-paper-v1.0.pdf
          cp paper/mpp-i-paper-v1.0.tex _site/mpp-i-paper-v1.0.tex
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

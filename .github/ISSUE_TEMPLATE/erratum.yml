name: Erratum
description: Report a concrete correction to the paper, docs, or future spec.
title: "[Erratum]: "
labels: ["erratum"]
body:
  - type: input
    id: location
    attributes:
      label: Location
      description: File, section, page, or URL.
    validations:
      required: true
  - type: textarea
    id: current
    attributes:
      label: Current text or behaviour
    validations:
      required: true
  - type: textarea
    id: proposed
    attributes:
      label: Proposed correction
    validations:
      required: true
  - type: textarea
    id: reason
    attributes:
      label: Why this matters
    validations:
      required: true


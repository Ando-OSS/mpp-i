name: Citation Or Source Issue
description: Report a missing, stale, or incorrect citation.
title: "[Citation]: "
labels: ["citation"]
body:
  - type: input
    id: claim
    attributes:
      label: Claim or location
    validations:
      required: true
  - type: input
    id: source
    attributes:
      label: Source URL or DOI
    validations:
      required: true
  - type: textarea
    id: reason
    attributes:
      label: Why this source is relevant
    validations:
      required: true

